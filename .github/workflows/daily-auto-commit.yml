name: Daily Auto Commit

on:
  schedule:
    # Runs once per day at 03:15 UTC (specific hour/minute, no wildcards)
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 21f3000161@ds.study.iitm.ac.in - Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "21f3000161@ds.study.iitm.ac.in"

      - name: Make a daily update file change
        run: |
          mkdir -p .github
          echo "Last updated: $(date -u)" > .github/daily-update.txt

      - name: Commit and push changes
        run: |
          git add .github/daily-update.txt
          git commit -m "chore: daily automated update" || echo "No changes to commit"
          git push
